<?xml version="1.0" encoding="utf-8"?>

<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.0//EN" "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg version="1.0" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" 
	 width="800px" height="800px" viewBox="0 0 64 64" enable-background="new 0 0 64 64" xml:space="preserve">
	<defs>
		<radialGradient id="pearlGradient" cx="40%" cy="30%">
			<stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
			<stop offset="10%" style="stop-color:#f8f6f3;stop-opacity:1" />
			<stop offset="25%" style="stop-color:#ede8e3;stop-opacity:1" />
			<stop offset="40%" style="stop-color:#dcd4c8;stop-opacity:1" />
			<stop offset="55%" style="stop-color:#c8bba8;stop-opacity:1" />
			<stop offset="70%" style="stop-color:#b4a191;stop-opacity:1" />
			<stop offset="85%" style="stop-color:#a09080;stop-opacity:1" />
			<stop offset="100%" style="stop-color:#9a8470;stop-opacity:1" />
		</radialGradient>
		
		<pattern id="pearlSurface" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
			<rect width="6" height="6" fill="#f0e8e0"/>
			<circle cx="1.5" cy="1.5" r="0.4" fill="#ffffff" opacity="0.6"/>
			<circle cx="4.5" cy="2.5" r="0.3" fill="#ffffff" opacity="0.5"/>
			<circle cx="3" cy="4.5" r="0.35" fill="#ffffff" opacity="0.55"/>
			<circle cx="0.8" cy="4.8" r="0.2" fill="#ffffff" opacity="0.4"/>
			<circle cx="5.2" cy="0.8" r="0.25" fill="#ffffff" opacity="0.45"/>
			<circle cx="2.8" cy="2.8" r="0.15" fill="#ffffff" opacity="0.3"/>
		</pattern>
		
		<filter id="pearlTexture" filterUnits="objectBoundingBox" x="0" y="0" width="1" height="1">
			<feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="8" result="noise"/>
			<feColorMatrix in="noise" type="saturate" values="0" result="noiseGray"/>
			<feDisplacementMap in="SourceGraphic" in2="noiseGray" scale="1" xChannelSelector="R" yChannelSelector="G" result="textured"/>
			<feComposite in="textured" in2="SourceAlpha" operator="in" result="masked"/>
		</filter>
		
		<filter id="iridescentEffect" filterUnits="objectBoundingBox" x="0" y="0" width="1" height="1">
			<feGaussianBlur in="SourceGraphic" stdDeviation="0.3" result="blur"/>
			<feSpecularLighting result="specOut" in="blur" specularConstant="3" specularExponent="25" lighting-color="white">
				<fePointLight x="-20" y="10" z="120"/>
				<fePointLight x="15" y="-5" z="90"/>
			</feSpecularLighting>
			<feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut2"/>
			<feComposite in="SourceGraphic" in2="specOut2" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="lit"/>
			<feComposite in="lit" in2="SourceAlpha" operator="in"/>
		</filter>
		
		<filter id="shimmer" filterUnits="objectBoundingBox" x="0" y="0" width="1" height="1">
			<feGaussianBlur stdDeviation="1" result="coloredBlur"/>
			<feMerge>
				<feMergeNode in="coloredBlur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
			<feComposite in2="SourceAlpha" operator="in"/>
		</filter>
	</defs>
	
	<!-- Estrella con relleno perlado completo sin efectos externos -->
	<g>
		<path fill="url(#pearlGradient)" 
			  filter="url(#pearlTexture)" 
			  d="M62.799,23.737c-0.47-1.399-1.681-2.419-3.139-2.642l-16.969-2.593L35.069,2.265
			   C34.419,0.881,33.03,0,31.504,0c-1.527,0-2.915,0.881-3.565,2.265l-7.623,16.238L3.347,21.096c-1.458,0.223-2.669,1.242-3.138,2.642
			   c-0.469,1.4-0.115,2.942,0.916,4l12.392,12.707l-2.935,17.977c-0.242,1.488,0.389,2.984,1.62,3.854
			   c1.23,0.87,2.854,0.958,4.177,0.228l15.126-8.365l15.126,8.365c0.597,0.33,1.254,0.492,1.908,0.492c0.796,0,1.592-0.242,2.269-0.72
			   c1.231-0.869,1.861-2.365,1.619-3.854l-2.935-17.977l12.393-12.707C62.914,26.68,63.268,25.138,62.799,23.737z">
			<animate attributeName="opacity" values="0.55;1;0.55" dur="1.2s" repeatCount="indefinite" />
		</path>
		
		<path fill="url(#pearlSurface)" 
			  opacity="0.6" 
			  filter="url(#iridescentEffect)"
			  d="M62.799,23.737c-0.47-1.399-1.681-2.419-3.139-2.642l-16.969-2.593L35.069,2.265
			   C34.419,0.881,33.03,0,31.504,0c-1.527,0-2.915,0.881-3.565,2.265l-7.623,16.238L3.347,21.096c-1.458,0.223-2.669,1.242-3.138,2.642
			   c-0.469,1.4-0.115,2.942,0.916,4l12.392,12.707l-2.935,17.977c-0.242,1.488,0.389,2.984,1.62,3.854
			   c1.23,0.87,2.854,0.958,4.177,0.228l15.126-8.365l15.126,8.365c0.597,0.33,1.254,0.492,1.908,0.492c0.796,0,1.592-0.242,2.269-0.72
			   c1.231-0.869,1.861-2.365,1.619-3.854l-2.935-17.977l12.393-12.707C62.914,26.68,63.268,25.138,62.799,23.737z">
			<animate attributeName="opacity" values="0.15;0.85;0.15" dur="1.4s" repeatCount="indefinite" />
		</path>
		
		<path fill="url(#pearlGradient)" 
			  opacity="0.3" 
			  filter="url(#shimmer)"
			  d="M62.799,23.737c-0.47-1.399-1.681-2.419-3.139-2.642l-16.969-2.593L35.069,2.265
			   C34.419,0.881,33.03,0,31.504,0c-1.527,0-2.915,0.881-3.565,2.265l-7.623,16.238L3.347,21.096c-1.458,0.223-2.669,1.242-3.138,2.642
			   c-0.469,1.4-0.115,2.942,0.916,4l12.392,12.707l-2.935,17.977c-0.242,1.488,0.389,2.984,1.62,3.854
			   c1.23,0.87,2.854,0.958,4.177,0.228l15.126-8.365l15.126,8.365c0.597,0.33,1.254,0.492,1.908,0.492c0.796,0,1.592-0.242,2.269-0.72
			   c1.231-0.869,1.861-2.365,1.619-3.854l-2.935-17.977l12.393-12.707C62.914,26.68,63.268,25.138,62.799,23.737z">
			<animate attributeName="opacity" values="0.05;0.65;0.05" dur="0.9s" repeatCount="indefinite" />
		</path>
	</g>
</svg>